name: Aggregate Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [aggregate]

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Aggregate multirepo docs
        uses: mintlify/mintlify-multirepo-action@v0.15
        with:
          token: ${{ secrets.PUSH_TOKEN }}
          target-branch: docs
          repos: |
            - owner: vivla-tech
              repo: vivla-backend
              subdirectory: docs
            - owner: vivla-tech
              repo: vivla-mobile-app
              subdirectory: docs
            - owner: vivla-tech
              repo: vivla-tools
              subdirectory: docs
            # TODO: descomentar cuando se identifique el repo del panel
            # - owner: vivla-tech
            #   repo: PANEL_REPO_NAME
            #   subdirectory: docs
