name: Aggregate Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [aggregate]

jobs:
  aggregate:
    runs-on: ubuntu-latest
    env:
      # To add a new subrepo: append a line with format repo:subdir:dest
      # e.g. vivla-tech/vivla-api:docs/wiki:backend
      # e.g. vivla-tech/vivla-panel:docs/wiki:panel
      SUBREPOS: |
        vivla-tech/vivla-tools:docs/wiki:tools
        vivla-tech/vivla-mobile-app:docs/wiki:mobile
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Clone subrepos and copy docs
        env:
          GH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          set -e

          # Clone to /tmp to avoid polluting the workspace
          CLONE_DIR="/tmp/subrepo_clones"
          rm -rf "$CLONE_DIR"
          mkdir -p "$CLONE_DIR"

          while IFS= read -r entry; do
            [[ -z "$entry" || "$entry" =~ ^[[:space:]]*# ]] && continue
            IFS=':' read -r repo subdir dest <<< "$entry"
            echo "::group::Cloning $repo ($subdir → $dest)"

            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" "${CLONE_DIR}/${dest}"

            # Remove old pages for this subrepo
            rm -rf "${dest}"

            if [ -d "${CLONE_DIR}/${dest}/${subdir}" ]; then
              mkdir -p "${dest}"

              # Copy all .mdx files
              find "${CLONE_DIR}/${dest}/${subdir}" -name '*.mdx' | while read -r file; do
                rel="${file#${CLONE_DIR}/${dest}/${subdir}/}"
                target_dir="$(dirname "${rel}")"
                mkdir -p "${dest}/${target_dir}"
                cp "$file" "${dest}/${rel}"
              done

              # Copy the subrepo docs.json for navigation merge
              if [ -f "${CLONE_DIR}/${dest}/${subdir}/docs.json" ]; then
                cp "${CLONE_DIR}/${dest}/${subdir}/docs.json" "${dest}/_subrepo_nav.json"
                echo "  Copied docs + navigation from $repo to $dest/"
              else
                echo "  Copied docs from $repo to $dest/ (no docs.json found, tab won't be added)"
              fi
            else
              echo "  Warning: $repo has no $subdir/ directory, skipping"
            fi

            echo "::endgroup::"
          done <<< "$SUBREPOS"

          rm -rf "$CLONE_DIR"

      - name: Merge navigation
        run: |
          python3 << 'PYTHON'
          import json, os, sys

          with open('docs.json') as f:
              config = json.load(f)

          tabs = config['navigation']['tabs']

          for entry in os.environ.get('SUBREPOS', '').strip().split('\n'):
              entry = entry.strip()
              if not entry or entry.startswith('#'):
                  continue
              _, _, dest = entry.split(':')

              nav_file = f'{dest}/_subrepo_nav.json'
              if not os.path.isfile(nav_file):
                  print(f'  Skipping {dest}: no _subrepo_nav.json')
                  continue

              with open(nav_file) as f:
                  sub_nav = json.load(f)

              # Normalize tab names so subrepos don't control the final label
              tab_renames = {'Tools': 'Vivla Tools'}
              raw_tab = sub_nav.get('tab', dest.capitalize())
              tab_name = tab_renames.get(raw_tab, raw_tab)
              groups = sub_nav.get('groups', [])

              def prefix_pages(obj):
                  if isinstance(obj, str):
                      return f'{dest}/{obj}'
                  elif isinstance(obj, list):
                      return [prefix_pages(item) for item in obj]
                  elif isinstance(obj, dict):
                      result = {}
                      for k, v in obj.items():
                          if k == 'pages':
                              result[k] = prefix_pages(v)
                          else:
                              result[k] = v
                      return result
                  return obj

              prefixed_groups = [prefix_pages(g) for g in groups]

              tabs = [t for t in tabs if t.get('tab') != tab_name]
              tabs.append({
                  'tab': tab_name,
                  'groups': prefixed_groups
              })

              print(f'  Added tab "{tab_name}" from {dest} ({len(groups)} groups)')
              os.remove(nav_file)

          # Sort tabs: defined order first, then everything else, Infra always last
          tab_order = ['Overview', 'Vivla Tools', 'Mobile App', 'Vivla API', 'Panel', 'Infra']
          def tab_sort_key(t):
              name = t.get('tab', '')
              if name in tab_order:
                  return tab_order.index(name)
              return len(tab_order)
          tabs.sort(key=tab_sort_key)

          config['navigation']['tabs'] = tabs

          with open('docs.json', 'w') as f:
              json.dump(config, f, indent=2, ensure_ascii=False)

          print('  docs.json updated')
          PYTHON

      - name: Verify pages
        run: |
          echo "Verifying pages referenced in docs.json..."
          python3 << 'PYTHON'
          import json, os

          with open('docs.json') as f:
              config = json.load(f)

          missing = 0

          def check_pages(obj):
              global missing
              if isinstance(obj, str):
                  if not os.path.isfile(f'{obj}.mdx'):
                      print(f'  Warning: {obj}.mdx not found')
                      missing += 1
              elif isinstance(obj, list):
                  for item in obj:
                      check_pages(item)
              elif isinstance(obj, dict):
                  if 'pages' in obj:
                      check_pages(obj['pages'])
                  for key in ['tabs', 'groups']:
                      if key in obj:
                          check_pages(obj[key])

          check_pages(config.get('navigation', {}))

          if missing > 0:
              print(f'  {missing} page(s) missing')
          else:
              print('  All pages verified')
          PYTHON

      - name: Push to docs branch
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B docs

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Aggregate docs from subrepos [skip ci]"
            git push -f origin docs
            echo "Pushed aggregated docs to 'docs' branch"
          fi
