name: Aggregate Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [aggregate]

jobs:
  aggregate:
    runs-on: ubuntu-latest
    env:
      SUBREPOS: |
        vivla-tech/vivla-mobile-app:docs:mobile
        vivla-tech/vivla-tools:docs:tools
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Clone subrepos and copy docs
        env:
          GH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          set -e

          for entry in $SUBREPOS; do
            [[ -z "$entry" || "$entry" =~ ^[[:space:]]*# ]] && continue
            IFS=':' read -r repo subdir dest <<< "$entry"
            echo "::group::Cloning $repo ($subdir → $dest)"

            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" "_tmp_${dest}"

            # Remove old pages for this subrepo
            rm -rf "${dest}"

            if [ -d "_tmp_${dest}/${subdir}" ]; then
              mkdir -p "${dest}"

              # Copy all .mdx files
              cd "_tmp_${dest}/${subdir}"
              find . -name '*.mdx' | while read -r file; do
                target_dir="$(dirname "${file}")"
                mkdir -p "../../../${dest}/${target_dir}"
                cp "$file" "../../../${dest}/${file}"
              done
              cd ../../..

              # Copy the subrepo docs.json for navigation merge
              if [ -f "_tmp_${dest}/${subdir}/docs.json" ]; then
                cp "_tmp_${dest}/${subdir}/docs.json" "${dest}/_subrepo_nav.json"
                echo "  Copied docs + navigation from $repo to $dest/"
              else
                echo "  Copied docs from $repo to $dest/ (no docs.json found, tab won't be added)"
              fi
            else
              echo "  Warning: $repo has no $subdir/ directory, skipping"
            fi

            rm -rf "_tmp_${dest}"
            echo "::endgroup::"
          done

          rm -rf _tmp_*

      - name: Merge navigation
        run: |
          python3 << 'PYTHON'
          import json, os, sys

          # Load central docs.json
          with open('docs.json') as f:
              config = json.load(f)

          tabs = config['navigation']['tabs']

          # Scan for subrepo navigation files
          for entry in os.environ.get('SUBREPOS', '').strip().split('\n'):
              entry = entry.strip()
              if not entry or entry.startswith('#'):
                  continue
              _, _, dest = entry.split(':')

              nav_file = f'{dest}/_subrepo_nav.json'
              if not os.path.isfile(nav_file):
                  print(f'  Skipping {dest}: no _subrepo_nav.json')
                  continue

              with open(nav_file) as f:
                  sub_nav = json.load(f)

              tab_name = sub_nav.get('tab', dest.capitalize())
              groups = sub_nav.get('groups', [])

              # Prefix all page paths with the destination folder
              def prefix_pages(obj):
                  if isinstance(obj, str):
                      return f'{dest}/{obj}'
                  elif isinstance(obj, list):
                      return [prefix_pages(item) for item in obj]
                  elif isinstance(obj, dict):
                      result = {}
                      for k, v in obj.items():
                          if k == 'pages':
                              result[k] = prefix_pages(v)
                          else:
                              result[k] = v
                      return result
                  return obj

              prefixed_groups = [prefix_pages(g) for g in groups]

              # Remove existing tab with same name (if any)
              tabs = [t for t in tabs if t.get('tab') != tab_name]

              # Add the new tab
              tabs.append({
                  'tab': tab_name,
                  'groups': prefixed_groups
              })

              print(f'  Added tab "{tab_name}" from {dest} ({len(groups)} groups)')

              # Clean up the temp nav file
              os.remove(nav_file)

          config['navigation']['tabs'] = tabs

          with open('docs.json', 'w') as f:
              json.dump(config, f, indent=2, ensure_ascii=False)

          print('  docs.json updated')
          PYTHON

      - name: Verify pages
        run: |
          echo "Verifying pages referenced in docs.json..."
          python3 << 'PYTHON'
          import json, os

          with open('docs.json') as f:
              config = json.load(f)

          missing = 0

          def check_pages(obj):
              global missing
              if isinstance(obj, str):
                  if not os.path.isfile(f'{obj}.mdx'):
                      print(f'  Warning: {obj}.mdx not found')
                      missing += 1
              elif isinstance(obj, list):
                  for item in obj:
                      check_pages(item)
              elif isinstance(obj, dict):
                  if 'pages' in obj:
                      check_pages(obj['pages'])
                  for key in ['tabs', 'groups']:
                      if key in obj:
                          check_pages(obj[key])

          check_pages(config.get('navigation', {}))

          if missing > 0:
              print(f'  {missing} page(s) missing')
          else:
              print('  All pages verified')
          PYTHON

      - name: Push to docs branch
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B docs

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Aggregate docs from subrepos [skip ci]"
            git push -f origin docs
            echo "Pushed aggregated docs to 'docs' branch"
          fi
